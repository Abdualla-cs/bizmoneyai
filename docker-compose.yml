version: "3.9"
services:
  db:
    image: postgres:16
    container_name: bizmoneyai-postgres
    environment:
      POSTGRES_DB: bizmoney
      POSTGRES_USER: bizmoney
      POSTGRES_PASSWORD: bizmoney
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
